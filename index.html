<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グラフ・表 れんしゅうアプリ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');
:root{
  --sky:#29b6f6;--skyL:#e3f2fd;--grass:#66bb6a;--grassL:#e8f5e9;
  --coral:#ff7043;--coralL:#fbe9e7;--sun:#ffd600;--purple:#ab47bc;
  --bg:#f0f8ff;--card:#fff;--text:#1a2a3a;--sub:#6a7a8a;
  --r:18px;--sh:0 4px 20px rgba(0,0,0,0.09);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'M PLUS Rounded 1c','メイリオ',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ---- header ---- */
header{background:linear-gradient(120deg,#1565c0,#00838f);padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 3px 14px rgba(0,0,0,0.22);}
.logo-wrap{font-size:2.2rem;animation:spin 6s linear infinite;display:inline-block;}
@keyframes spin{0%,90%{transform:rotate(0)}95%{transform:rotate(20deg)}100%{transform:rotate(0)}}
header h1{font-family:'Kaisei Decol',serif;font-size:1.35rem;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,0.3);line-height:1.25;}
header h1 small{font-size:0.72rem;display:block;font-family:'M PLUS Rounded 1c',sans-serif;opacity:.85;font-weight:400;}

/* ---- streak / score bar ---- */
.top-bar{background:#fff;border-bottom:3px solid #e1f0fb;padding:8px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.streak-badge{background:linear-gradient(135deg,#ff8f00,#fdd835);color:#fff;font-weight:800;font-size:.8rem;padding:4px 12px;border-radius:20px;box-shadow:0 2px 6px rgba(255,143,0,.4);display:flex;align-items:center;gap:4px;}
.xp-bar-wrap{flex:1;min-width:120px;max-width:260px;}
.xp-label{font-size:.72rem;font-weight:700;color:var(--sub);margin-bottom:3px;display:flex;justify-content:space-between;}
.xp-track{background:#e0e0e0;border-radius:8px;height:8px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,#ab47bc,#7c43bd);border-radius:8px;transition:width .5s ease;}
.total-score-disp{margin-left:auto;font-weight:800;font-size:.85rem;color:#1565c0;}

/* ---- grade bar ---- */
.grade-bar{background:#fff;padding:8px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:2px solid #e8f4fd;}
.grade-bar label{font-size:.82rem;font-weight:700;color:var(--sub);}
.grade-btn{padding:5px 15px;border:2px solid #ccc;border-radius:20px;background:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;color:var(--sub);}
.grade-btn:hover{border-color:var(--sky);color:var(--sky);}
.grade-btn.active{background:var(--sky);border-color:var(--sky);color:#fff;box-shadow:0 2px 8px rgba(41,182,246,.4);}

/* ---- tabs ---- */
.tabs{display:flex;gap:5px;padding:14px 18px 0;flex-wrap:wrap;max-width:860px;margin:0 auto;}
.tab-btn{padding:8px 16px;border:none;border-radius:12px 12px 0 0;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;background:#ddd;color:#999;transition:all .2s;}
.tab-btn.active{background:#fff;color:var(--text);box-shadow:0 -2px 8px rgba(0,0,0,.08);}

/* ---- main ---- */
main{padding:0 18px 60px;max-width:860px;margin:0 auto;}
.panel{background:#fff;border-radius:0 var(--r) var(--r) var(--r);box-shadow:var(--sh);padding:24px;}

/* ---- set header ---- */
.set-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
.set-icon{font-size:2rem;flex-shrink:0;}
.set-title{font-family:'Kaisei Decol',serif;font-size:1.1rem;color:#0d47a1;line-height:1.3;}
.set-desc{font-size:.83rem;color:var(--sub);margin-top:3px;}

/* ---- table ---- */
.tbl-wrap{overflow-x:auto;margin:14px 0;}
.dtbl{border-collapse:collapse;width:100%;font-size:.95rem;}
.dtbl th{background:linear-gradient(135deg,#29b6f6,#0288d1);color:#fff;padding:8px 12px;font-weight:800;text-align:center;border:2px solid #0277bd;}
.dtbl td{border:2px solid #e0e0e0;padding:7px 12px;text-align:center;font-weight:700;background:#fff;}
.dtbl .rh{background:linear-gradient(135deg,#fff8e1,#ffecb3);color:#e65100;font-weight:800;}
.dtbl .tot{background:#fffde7;color:#f57f17;}
.dtbl tr:hover td{background:#f0faff;}

/* ---- chart ---- */
.chart-wrap{background:#f9fafb;border-radius:12px;padding:14px;margin:14px 0;border:2px solid #e4e9f0;display:flex;justify-content:center;overflow-x:auto;}
canvas{max-width:100%;display:block;}

/* ---- question card ---- */
.q-card{border-radius:14px;padding:16px 20px;margin-bottom:16px;border-left:5px solid var(--sky);background:linear-gradient(135deg,#e3f2fd,#f3e5f5);}
.q-badge{display:inline-flex;align-items:center;gap:6px;background:var(--sky);color:#fff;font-size:.72rem;font-weight:800;padding:3px 11px;border-radius:16px;margin-bottom:8px;}
.q-type-tag{font-size:.65rem;background:rgba(255,255,255,.35);padding:1px 6px;border-radius:8px;}
.q-text{font-size:1rem;font-weight:700;line-height:1.9;}

/* ---- options ---- */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0;}
@media(max-width:500px){.opts{grid-template-columns:1fr;}}
.opt{padding:11px 13px;border:2.5px solid #ddd;border-radius:13px;background:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;text-align:left;line-height:1.5;transition:all .18s;display:flex;align-items:flex-start;gap:9px;color:var(--text);width:100%;}
.opt:hover:not(.dis){border-color:var(--sky);background:#e3f2fd;transform:translateY(-2px);}
.opt-lbl{min-width:26px;height:26px;border-radius:50%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0;transition:all .18s;}
.opt:hover:not(.dis) .opt-lbl{background:var(--sky);color:#fff;}
.opt.cor{border-color:var(--grass);background:var(--grassL);}
.opt.cor .opt-lbl{background:var(--grass);color:#fff;}
.opt.wrg{border-color:var(--coral);background:var(--coralL);}
.opt.wrg .opt-lbl{background:var(--coral);color:#fff;}
.opt.dis{pointer-events:none;opacity:.72;}

/* ---- number input ---- */
.num-row{display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin:12px 0;}
.num-in{width:105px;padding:9px 10px;border:2.5px solid #ddd;border-radius:11px;font-family:'M PLUS Rounded 1c',sans-serif;font-size:1.25rem;font-weight:800;text-align:center;outline:none;transition:border-color .2s;color:var(--text);}
.num-in:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(41,182,246,.18);}
.num-in.ci{border-color:var(--grass);background:var(--grassL);}
.num-in.wi{border-color:var(--coral);background:var(--coralL);}
.unit{font-size:.95rem;font-weight:700;color:var(--sub);}

/* ---- buttons ---- */
.btn-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;align-items:center;}
.btn-ans{padding:11px 26px;border:none;border-radius:26px;background:linear-gradient(135deg,#29b6f6,#0288d1);color:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.93rem;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(2,136,209,.3);transition:all .2s;}
.btn-ans:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(2,136,209,.4);}
.btn-ans:disabled{opacity:.45;pointer-events:none;}
.btn-next{padding:11px 26px;border:none;border-radius:26px;background:linear-gradient(135deg,#66bb6a,#388e3c);color:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.93rem;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(56,142,60,.3);transition:all .2s;display:none;}
.btn-next:hover{transform:translateY(-2px);}
.btn-next.show{display:block;}
.btn-hint{padding:8px 16px;border:2px solid #ab47bc;border-radius:20px;background:#fff;color:#ab47bc;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-hint:hover{background:#f3e5f5;}
.btn-hint:disabled{opacity:.4;pointer-events:none;}

/* ---- hint box ---- */
.hint-box{background:#f3e5f5;border:2px solid #ce93d8;border-radius:12px;padding:10px 14px;margin-top:10px;font-size:.85rem;font-weight:700;color:#6a1b9a;display:none;animation:popIn .25s ease;}
.hint-box.show{display:block;}

/* ---- feedback ---- */
.fb{border-radius:13px;padding:12px 15px;margin-top:11px;font-weight:700;font-size:.92rem;display:none;align-items:flex-start;gap:9px;line-height:1.7;animation:popIn .3s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.95) translateY(5px);}to{opacity:1;transform:scale(1) translateY(0);}}
.fb.ok{display:flex;background:var(--grassL);border:2px solid var(--grass);color:#2e7d32;}
.fb.ng{display:flex;background:var(--coralL);border:2px solid var(--coral);color:#bf360c;}
.fb-icon{font-size:1.4rem;flex-shrink:0;}
.fb-combo{font-size:.8rem;font-weight:800;color:#ff8f00;background:#fff8e1;padding:2px 8px;border-radius:10px;margin-left:6px;}

/* ---- progress ---- */
.prog-row{display:flex;justify-content:space-between;font-size:.76rem;color:var(--sub);margin-bottom:4px;font-weight:700;}
.prog-track{background:#e0e0e0;border-radius:8px;height:9px;margin-bottom:16px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#29b6f6,#66bb6a);border-radius:8px;transition:width .4s ease;}

/* ---- score screen ---- */
.score-screen{text-align:center;padding:24px 16px;}
.score-big{font-size:3.5rem;font-weight:800;color:#1565c0;line-height:1;}
.score-sub2{font-size:1rem;color:var(--sub);margin:6px 0 20px;}
.grade-msg{font-size:1.3rem;font-weight:800;margin-bottom:6px;}
.medals-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:14px 0;}
.medal{font-size:2.2rem;animation:bounce .6s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-8px);}}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:320px;margin:16px auto;}
.stat-cell{background:#f0f8ff;border-radius:12px;padding:12px 10px;font-size:.85rem;font-weight:700;}
.stat-cell strong{display:block;font-size:1.4rem;color:#1565c0;}
.retry-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px;}
.btn-retry{padding:12px 28px;border:none;border-radius:26px;background:linear-gradient(135deg,#29b6f6,#0288d1);color:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.97rem;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(2,136,209,.3);transition:all .2s;}
.btn-retry:hover{transform:translateY(-2px);}
.btn-shuffle{padding:12px 28px;border:none;border-radius:26px;background:linear-gradient(135deg,#ab47bc,#7b1fa2);color:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.97rem;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(123,31,162,.3);transition:all .2s;}
.btn-shuffle:hover{transform:translateY(-2px);}

/* ---- combo toast ---- */
.combo-toast{position:fixed;top:80px;right:20px;background:linear-gradient(135deg,#ff8f00,#fdd835);color:#fff;font-weight:800;font-size:1.1rem;padding:10px 20px;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:1000;opacity:0;transform:translateX(60px);transition:all .3s;pointer-events:none;}
.combo-toast.show{opacity:1;transform:translateX(0);}

/* ---- stars ---- */
.stars-c{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;display:none;}
.star{position:absolute;font-size:1.4rem;animation:sFly 1.3s ease-out forwards;}
@keyframes sFly{0%{opacity:1;transform:translateY(0) scale(1) rotate(0);}100%{opacity:0;transform:translateY(-130px) scale(1.9) rotate(400deg);}}

/* ---- level up ---- */
.levelup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,#ab47bc,#1565c0);color:#fff;padding:24px 36px;border-radius:24px;text-align:center;z-index:1100;box-shadow:0 8px 40px rgba(0,0,0,.35);transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
.levelup.show{transform:translate(-50%,-50%) scale(1);}
.levelup h2{font-size:1.8rem;font-weight:800;}
.levelup p{opacity:.85;font-size:.9rem;margin-top:4px;}

ruby rt{font-size:.58em;color:#888;}
@media(max-width:600px){.panel{padding:14px 11px;}.q-text{font-size:.95rem;}}

/* ---- キャラクター ---- */
.chara-wrap{position:fixed;bottom:18px;right:16px;z-index:500;display:flex;flex-direction:column;align-items:flex-end;gap:6px;pointer-events:none;}
.chara-bubble{background:#fff;border:2.5px solid #29b6f6;border-radius:16px 16px 4px 16px;padding:8px 13px;font-size:.82rem;font-weight:700;color:#1a2a3a;max-width:170px;line-height:1.5;box-shadow:0 3px 12px rgba(0,0,0,.13);opacity:0;transform:translateY(8px);transition:all .35s;pointer-events:none;}
.chara-bubble.show{opacity:1;transform:translateY(0);}
.chara-face{font-size:2.8rem;filter:drop-shadow(0 3px 6px rgba(0,0,0,.18));transition:transform .3s;cursor:pointer;pointer-events:all;}
.chara-face:hover{transform:scale(1.12);}
.chara-face.bounce{animation:cBounce .4s ease;}
@keyframes cBounce{0%{transform:scale(1)}40%{transform:scale(1.25)}70%{transform:scale(.92)}100%{transform:scale(1)}}

/* ---- スタンプカード ---- */
.stamp-modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1200;display:none;align-items:center;justify-content:center;}
.stamp-modal.open{display:flex;}
.stamp-box{background:#fff;border-radius:24px;padding:26px 22px;max-width:420px;width:92%;box-shadow:0 10px 40px rgba(0,0,0,.3);animation:popIn .35s ease;}
.stamp-box h2{font-family:'Kaisei Decol',serif;font-size:1.2rem;color:#0d47a1;margin-bottom:4px;}
.stamp-box p{font-size:.8rem;color:var(--sub);margin-bottom:16px;}
.stamp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
.stamp-cell{aspect-ratio:1;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.6rem;border:2.5px dashed #ccc;background:#f5f5f5;transition:all .3s;position:relative;}
.stamp-cell.earned{background:linear-gradient(135deg,#fff9c4,#fff3e0);border:2.5px solid #ffd600;box-shadow:0 2px 8px rgba(255,214,0,.35);}
.stamp-cell.earned::after{content:attr(data-label);position:absolute;bottom:3px;font-size:.5rem;font-weight:800;color:#e65100;white-space:nowrap;}
.stamp-cell .s-icon{font-size:1.5rem;filter:grayscale(1);opacity:.3;transition:all .4s;}
.stamp-cell.earned .s-icon{filter:none;opacity:1;animation:stampPop .5s ease;}
@keyframes stampPop{0%{transform:scale(0) rotate(-20deg);}60%{transform:scale(1.3) rotate(5deg);}100%{transform:scale(1) rotate(0);}}
.stamp-close{padding:10px 28px;border:none;border-radius:20px;background:linear-gradient(135deg,#29b6f6,#0288d1);color:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.93rem;font-weight:800;cursor:pointer;width:100%;}
.stamp-new-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,#ffd600,#ff8f00);color:#fff;padding:18px 28px;border-radius:20px;z-index:1300;text-align:center;font-weight:800;font-size:1.1rem;box-shadow:0 6px 24px rgba(0,0,0,.3);transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
.stamp-new-toast.show{transform:translate(-50%,-50%) scale(1);}

/* ---- まちがいノート ---- */
.note-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1200;display:none;align-items:flex-start;justify-content:center;padding:20px 12px;overflow-y:auto;}
.note-modal.open{display:flex;}
.note-box{background:#fff;border-radius:22px;padding:22px 18px;max-width:600px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.28);animation:popIn .3s ease;}
.note-box h2{font-family:'Kaisei Decol',serif;font-size:1.15rem;color:#c62828;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.note-item{background:#fff8f8;border:2px solid #ffcdd2;border-radius:14px;padding:13px 14px;margin-bottom:10px;position:relative;}
.note-item-head{font-size:.78rem;font-weight:800;color:#e57373;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
.note-q{font-size:.9rem;font-weight:700;line-height:1.7;margin-bottom:6px;}
.note-exp{font-size:.8rem;color:#5d4037;background:#fff3e0;border-radius:8px;padding:7px 10px;line-height:1.6;}
.note-retry-btn{padding:5px 14px;border:none;border-radius:14px;background:linear-gradient(135deg,#ff7043,#e64a19);color:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.78rem;font-weight:800;cursor:pointer;}
.note-empty{text-align:center;padding:30px;color:var(--sub);font-size:.95rem;}
.note-close{padding:10px 28px;border:none;border-radius:20px;background:#f5f5f5;color:var(--text);font-family:'M PLUS Rounded 1c',sans-serif;font-size:.9rem;font-weight:800;cursor:pointer;width:100%;margin-top:6px;}

/* ---- コツカード ---- */
.tips-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1200;display:none;align-items:flex-start;justify-content:center;padding:20px 12px;overflow-y:auto;}
.tips-modal.open{display:flex;}
.tips-box{background:#fff;border-radius:22px;padding:22px 18px;max-width:580px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.28);animation:popIn .3s ease;}
.tips-box h2{font-family:'Kaisei Decol',serif;font-size:1.15rem;color:#0d47a1;margin-bottom:14px;}
.tips-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.tips-tab{padding:6px 14px;border:2px solid #ddd;border-radius:16px;background:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;color:var(--sub);transition:all .2s;}
.tips-tab.active{background:var(--sky);border-color:var(--sky);color:#fff;}
.tips-content{display:none;}
.tips-content.show{display:block;}
.tip-card{background:linear-gradient(135deg,#e3f2fd,#f0fff4);border:2px solid #b3e5fc;border-radius:14px;padding:13px 15px;margin-bottom:10px;}
.tip-card h3{font-size:.9rem;font-weight:800;color:#01579b;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.tip-card p{font-size:.83rem;line-height:1.75;color:#1a2a3a;}
.tip-card .tip-ex{background:#fff;border-radius:8px;padding:6px 10px;margin-top:7px;font-size:.8rem;color:#555;border-left:3px solid #29b6f6;}
.tips-close{padding:10px 28px;border:none;border-radius:20px;background:#f5f5f5;color:var(--text);font-family:'M PLUS Rounded 1c',sans-serif;font-size:.9rem;font-weight:800;cursor:pointer;width:100%;margin-top:6px;}

/* ---- フローティングボタン群 ---- */
.fab-group{position:fixed;bottom:20px;left:16px;z-index:490;display:flex;flex-direction:column;gap:9px;}
.fab{width:48px;height:48px;border-radius:50%;border:none;font-size:1.3rem;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.22);transition:all .2s;display:flex;align-items:center;justify-content:center;}
.fab:hover{transform:scale(1.12);}
.fab-note{background:linear-gradient(135deg,#ff7043,#e64a19);}
.fab-tips{background:linear-gradient(135deg,#ab47bc,#7b1fa2);}
.fab-stamp{background:linear-gradient(135deg,#ffd600,#ff8f00);}
.fab-badge{position:absolute;top:-4px;right:-4px;background:#f44336;color:#fff;font-size:.55rem;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

/* ---- スタンプ新着通知 ---- */
.stamp-new-toast p{font-size:.85rem;opacity:.9;margin-top:4px;}
</style>
</head>
<body>

<div class="stars-c" id="starsC"></div>
<div class="combo-toast" id="comboToast"></div>
<div class="levelup" id="levelupBox"><h2 id="levelupTxt"></h2><p id="levelupSub"></p></div>
<div class="stamp-new-toast" id="stampNewToast"><div id="stampNewIcon" style="font-size:2.2rem"></div><div id="stampNewTxt"></div><p id="stampNewSub"></p></div>

<!-- キャラクター -->
<div class="chara-wrap" id="charaWrap">
  <div class="chara-bubble" id="charaBubble">こんにちは！いっしょにがんばろう！</div>
  <div class="chara-face" id="charaFace" onclick="toggleBubble()">🦉</div>
</div>

<!-- フローティングボタン -->
<div class="fab-group">
  <div style="position:relative">
    <button class="fab fab-note" onclick="openNote()" title="まちがいノート">📝</button>
    <span class="fab-badge" id="noteBadge" style="display:none">0</span>
  </div>

function getLv(){for(let i=XP_TABLE.length-1;i>=0;i--){if(xp>=XP_TABLE[i])return i+1;}return 1;}
function getNextXP(){const lv=getLv();return XP_TABLE[Math.min(lv,XP_TABLE.length-1)]||9999;}
function getLvName(){const lv=getLv();return LV_NAMES[Math.min(lv-1,LV_NAMES.length-1)];}

function addXP(pt){
  const oldLv=getLv();
  xp+=pt; totalScore+=pt;
  const newLv=getLv();
  updateTopBar();
  if(newLv>oldLv) showLevelUp(newLv);
}

function updateTopBar(){
  document.getElementById('streakBadge').textContent='🔥 '+streak+' れんぞく';
  const lv=getLv(), next=getNextXP(), prev=XP_TABLE[Math.min(lv-1,XP_TABLE.length-1)];
  const pct=Math.min(100,Math.round((xp-prev)/(next-prev)*100));
  document.getElementById('lvNum').textContent=lv;
  document.getElementById('lvName').textContent=getLvName();
  document.getElementById('xpLabel').textContent=xp+' / '+next+' XP';
  document.getElementById('xpFill').style.width=pct+'%';
  document.getElementById('totalScore').textContent=totalScore;
}

// セッション状態

let grade=4, cat='bar', qList=[], qIdx=0, sesScore=0, sesTotal=0, wrongIds=[];
let sessionStartTime=0;

function setGrade(g){
  grade=g;
  document.querySelectorAll('.grade-btn').forEach(b=>b.classList.toggle('active',+b.dataset.grade===g));
  const cats=GRADE_CATS[g];
  if(!cats.includes(cat))cat=cats[0];
  renderTabs(); startSession();
}
function setCategory(c){cat=c;renderTabs();startSession();}

function renderTabs(){
  const cats=GRADE_CATS[grade];
  document.getElementById('tabsC').innerHTML=cats.map(c=>
    `<button class="tab-btn ${c===cat?'active':''}" onclick="setCategory('${c}')">${CATS[c].icon} ${CATS[c].label}</button>`
  ).join('');
}

const SESSION_SIZE=5;
let allQList=[];
let sessionPage=0;

function startSession(retryWrong=false){
  const pool=(DB[cat]||[]).filter(s=>s.grade<=grade);
  if(!pool.length){
    document.getElementById('panel').innerHTML='<div style="text-align:center;padding:40px;color:#888;">この学年の問題はまだ準備中です 🛠️</div>';
    return;
  }
  if(retryWrong && wrongIds.length){
    allQList=shuffle(wrongIds.slice()); wrongIds=[];
  } else {
    allQList=[];
    pool.forEach(set=>set.qs.forEach((q,qi)=>allQList.push({set,q,id:set.title+'_'+qi})));
    allQList=shuffle(allQList);
  }
  sessionPage=0;
  startPage();
}

function startPage(){
  const start=sessionPage*SESSION_SIZE;
  qList=allQList.slice(start, start+SESSION_SIZE);
  qIdx=0; sesScore=0; sesTotal=qList.length; hintUsed=false;
  sessionStartTime=Date.now();
  renderQ();
}

function shuffle(a){
  const arr=[...a];
  for(let i=arr.length-1;i>0;i--){const j=0|Math.random()*(i+1);[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

// 問題描画
// =====================================================================
function renderQ(){
  if(qIdx>=qList.length){renderScore();return;}
  hintUsed=false;
  const {set,q}=qList[qIdx];
  const pct=Math.round(qIdx/sesTotal*100);
  const typeTag={read:'<ruby>数値<rt>すうち</rt></ruby>よみとり',choice:'えらぼう',analyze:'<ruby>読<rt>よ</rt></ruby>みとり<ruby>分析<rt>ぶんせき</rt></ruby>'}[q.type]||'もんだい';

  let html=`
  <div class="prog-row"><span>${qIdx+1} / ${sesTotal} <ruby>問<rt>もん</rt></ruby></span><span>⭐ ${sesScore} / ${qIdx}　🔥${combo}</span></div>
  <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
  <div class="set-head">
    <span class="set-icon">${CATS[cat].icon}</span>
    <div><div class="set-title">${set.titleH}</div><div class="set-desc">${set.descH}</div></div>
  </div>`;

  if(set.chartType==='table') html+=buildTable(set);
  else html+=`<div class="chart-wrap"><canvas id="cv" width="520" height="260"></canvas></div>`;

  html+=`<div class="q-card">
    <div class="q-badge">もんだい ${qIdx+1} <span class="q-type-tag">${typeTag}</span></div>
    <div class="q-text">${q.tH}</div>
  </div>`;

  if(q.type==='choice'||q.type==='analyze'){
    const sOpts=shuffle([...q.opts]);
    window._currentOpts=sOpts;   // 正誤比較用に保存
    html+=`<div class="opts">`;
    sOpts.forEach((o,i)=>{
      const disp=(q.oh&&q.oh[o])?q.oh[o]:o;
      html+=`<button class="opt" id="o${i}" data-idx="${i}" onclick="checkChoice(${i})">
        <span class="opt-lbl">${['ア','イ','ウ','エ'][i]}</span><span>${disp}</span></button>`;
    });
    html+=`</div>`;
  } else {
    html+=`<div class="num-row">
      <input class="num-in" type="number" id="ni" placeholder="?" onkeydown="if(event.key==='Enter')checkNum()" step="0.1">
      <span class="unit">${q.unit||''}</span>
    </div>`;
  }

  html+=`<div class="btn-row">
    ${q.type==='read'?'<button class="btn-ans" id="bAns" onclick="checkNum()">こたえる</button>':''}
    <button class="btn-hint" id="bHint" onclick="showHint()" ${q.hint?'':'disabled'}>💡 ヒント</button>
    <button class="btn-next" id="bNext" onclick="nextQ()">つぎの<ruby>問題<rt>もんだい</rt></ruby> →</button>
  </div>
  <div class="hint-box" id="hintBox">💡 ${q.hint||''}</div>
  <div class="fb" id="fbBox"></div>`;

  document.getElementById('panel').innerHTML=html;
  if(set.chartType!=='table') setTimeout(()=>drawChart(set),30);
  if(q.type==='read'){const ni=document.getElementById('ni');if(ni)ni.focus();}
}

function escA(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildTable(set){
  const hds=set.headsH||set.heads;
  const rws=set.rowsH||set.rows;
  let h=`<div class="tbl-wrap"><table class="dtbl"><thead><tr>`;
  hds.forEach(d=>h+=`<th>${d}</th>`);
  h+=`</tr></thead><tbody>`;
  rws.forEach((r,ri)=>{
    const tot=ri===rws.length-1;
    h+=`<tr>`;r.forEach((c,ci)=>h+=`<td class="${ci===0?'rh':''}${tot?' tot':''}">${c}</td>`);h+=`</tr>`;
  });
  return h+`</tbody></table></div>`;
}

// 正誤チェック
// =====================================================================
function checkChoice(idx){
  if(document.getElementById('o'+idx).classList.contains('dis'))return;
  const {q,id}=qList[qIdx];
  const btn=document.getElementById('o'+idx);
  const selected=(window._currentOpts||[])[idx];  // シャッフル済み配列から正しいテキストを取得
  const ok=selected===q.ans;
  resolveAnswer(ok,q,id,()=>{
    document.querySelectorAll('.opt').forEach(b=>b.classList.add('dis'));
    if(ok) btn.classList.add('cor');
    else{
      btn.classList.add('wrg');
      // 正解ボタンにも正解マークをつける
      document.querySelectorAll('.opt').forEach(b=>{
        const bidx=parseInt(b.getAttribute('data-idx'));
        if((window._currentOpts||[])[bidx]===q.ans) b.classList.add('cor');
      });
    }
  });
}

function checkNum(){
  const {q,id}=qList[qIdx];
  const ni=document.getElementById('ni');
  if(!ni)return;
  const v=parseFloat(ni.value);
  if(isNaN(v)){ni.focus();return;}
  const ok=Math.abs(v-q.ans)<0.05;
  resolveAnswer(ok,q,id,()=>{
    ni.classList.add(ok?'ci':'wi');
    const ba=document.getElementById('bAns');if(ba)ba.disabled=true;
  });
}

function resolveAnswer(ok,q,id,uiFn){
  uiFn();
  if(ok){
    sesScore++; combo++;
    const pts=hintUsed?5:10;
    addXP(pts);
    streak++;
    if(combo>maxCombo)maxCombo=combo;
    if(combo>=3)showComboToast(combo);
    showFB(true,q.expH,pts);
    fireStars(combo>=5?16:8);
    showCharaMsg(combo>=5?'combo5':combo>=3?'combo3':'correct');
    checkStamps(true, combo);
  } else {
    combo=0; streak=0;
    wrongIds.push({set:qList[qIdx].set,q,id});
    addMistake(qList[qIdx].set, q);   // まちがいノートに追加
    showFB(false,q.expH,0);
    showCharaMsg('wrong');
    checkStamps(false, 0);
  }
  updateTopBar();
  document.getElementById('bNext').classList.add('show');
}

function showHint(){
  const hb=document.getElementById('hintBox');
  if(hb){hb.classList.add('show');hintUsed=true;
    const bh=document.getElementById('bHint');if(bh)bh.disabled=true;}
}

function showFB(ok,expH,pts){
  const box=document.getElementById('fbBox');
  const comboHtml=combo>=3?`<span class="fb-combo">🔥 ${combo}れんぞく！</span>`:'';
  const ptsHtml=pts>0?` <span style="font-weight:800;color:#ff8f00;">+${pts}XP</span>`:'';
  box.className='fb '+(ok?'ok':'ng');
  box.innerHTML=`<span class="fb-icon">${ok?'⭐':'💡'}</span><div><strong>${ok?'せいかい！':'ざんねん…'}</strong>${comboHtml}${ptsHtml}<br>${expH||''}</div>`;
}

function showComboToast(n){
  const t=document.getElementById('comboToast');
  const msgs=['','','','🔥 3れんぞく！','🔥🔥 4れんぞく！','⚡ 5れんぞく！'];
  t.textContent=msgs[Math.min(n,msgs.length-1)]||(n+'れんぞく！🎉');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

  const elapsed=Math.round((Date.now()-sessionStartTime)/1000);

// =====================================================================
// グラフ描画
// =====================================================================
const W=520,H=260,PL=52,PR=28,PT=22,PB=50;
const CW=W-PL-PR,CH=H-PT-PB;

function drawChart(set){
  const cv=document.getElementById('cv');if(!cv)return;
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,W,H);
  const fn={bar:dBar,groupedBar:dGroupedBar,line:dLine,multiLine:dMultiLine,pie:dPie,combo:dCombo}[set.chartType];
  if(fn)fn(ctx,set);
}

function nMax(v,t){const r=v/t,m=Math.pow(10,Math.floor(Math.log10(r)));return [1,2,5,10].find(f=>f*m>=r)*m*t;}
function grid(ctx,sm,ticks,lColor='#777'){
  const st=sm/ticks;
  ctx.strokeStyle='#e8e8e8';ctx.lineWidth=1;
  ctx.fillStyle=lColor;ctx.font='11px sans-serif';ctx.textAlign='right';
  for(let i=0;i<=ticks;i++){
    const v=st*i,y=PT+CH-(v/sm)*CH;
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(PL+CW,y);ctx.stroke();
    ctx.fillText(v,PL-5,y+4);
  }
}
function rRect(ctx,x,y,w,h,r){
  if(h<=0)return;r=Math.min(r,w/2,h/2);
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h);
  ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();
}

function dBar(ctx,set){
  const sm=nMax(Math.max(...set.values)*1.05,5);grid(ctx,sm,5);
  const gap=CW/set.labels.length,bw=gap*.58;
  set.labels.forEach((lb,i)=>{
    const x=PL+i*gap+(gap-bw)/2,bh=(set.values[i]/sm)*CH;
    ctx.fillStyle=set.colorSet?set.colorSet[i%set.colorSet.length]:'#29b6f6';
    rRect(ctx,x,PT+CH-bh,bw,bh,4);
    ctx.fillStyle='#222';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
    ctx.fillText(set.values[i]+(set.unit||''),x+bw/2,PT+CH-bh-4);
    ctx.fillStyle='#555';ctx.font='10px sans-serif';ctx.fillText(lb,x+bw/2,PT+CH+18);
  });
}

function dGroupedBar(ctx,set){
  const all=set.datasets.flatMap(d=>d.values);
  const sm=nMax(Math.max(...all)*1.1,5);grid(ctx,sm,5);
  const n=set.datasets.length,gw=CW/set.labels.length,bw=gw*.72/n;
  set.labels.forEach((lb,li)=>{
    set.datasets.forEach((ds,di)=>{
      const x=PL+li*gw+gw*.14+di*bw,bh=(ds.values[li]/sm)*CH;
      ctx.fillStyle=ds.color;rRect(ctx,x,PT+CH-bh,bw-1,bh,3);
    });
    ctx.fillStyle='#555';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText(lb,PL+li*gw+gw/2,PT+CH+18);
  });
  set.datasets.forEach((ds,di)=>{
    const lx=PL+di*85;
    ctx.fillStyle=ds.color;ctx.fillRect(lx,H-15,11,11);
    ctx.fillStyle='#333';ctx.font='10px sans-serif';ctx.textAlign='left';
    ctx.fillText(ds.label,lx+14,H-5);
  });
}

function dLine(ctx,set){
  const sm=nMax(Math.max(...set.values)*1.1,5);grid(ctx,sm,5);
  const step=CW/(set.labels.length-1);
  ctx.strokeStyle='#ef5350';ctx.lineWidth=2.5;ctx.beginPath();
  set.values.forEach((v,i)=>{const x=PL+i*step,y=PT+CH-(v/sm)*CH;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.stroke();
  set.values.forEach((v,i)=>{
    const x=PL+i*step,y=PT+CH-(v/sm)*CH;
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fillStyle='#b71c1c';ctx.fill();
    ctx.fillStyle='#222';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText(v,x,y-8);
    ctx.fillStyle='#666';ctx.font='9px sans-serif';ctx.fillText(set.labels[i],x,PT+CH+17);
  });
}

function dMultiLine(ctx,set){
  const all=set.datasets.flatMap(d=>d.values);
  const sm=nMax(Math.max(...all)*1.1,5);grid(ctx,sm,5);
  const step=CW/(set.labels.length-1);
  set.datasets.forEach(ds=>{
    ctx.strokeStyle=ds.color;ctx.lineWidth=2.5;ctx.beginPath();
    ds.values.forEach((v,i)=>{const x=PL+i*step,y=PT+CH-(v/sm)*CH;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.stroke();
    ds.values.forEach((v,i)=>{
      const x=PL+i*step,y=PT+CH-(v/sm)*CH;
      ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=ds.color;ctx.fill();
    });
  });
  set.labels.forEach((lb,i)=>{
    ctx.fillStyle='#666';ctx.font='9px sans-serif';ctx.textAlign='center';
    ctx.fillText(lb,PL+i*step,PT+CH+17);
  });
  // 凡例
  set.datasets.forEach((ds,di)=>{
    const lx=PL+di*80;
    ctx.strokeStyle=ds.color;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(lx,H-9);ctx.lineTo(lx+16,H-9);ctx.stroke();
    ctx.fillStyle=ds.color;ctx.font='10px sans-serif';ctx.textAlign='left';ctx.fillText(ds.label,lx+19,H-5);
  });
}

function dPie(ctx,set){
  const cx=W/2-55,cy=H/2+5,r=Math.min(W,H)*.3;
  const tot=set.values.reduce((a,b)=>a+b,0);
  const colors=set.colorSet||['#ef5350','#ff7043','#ffd600','#66bb6a','#b0bec5'];
  let angle=-Math.PI/2;
  set.values.forEach((v,i)=>{
    const slice=v/tot*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();
    ctx.fillStyle=colors[i%colors.length];ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    if(v>=7){
      const ma=angle+slice/2;
      ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(v+'%',cx+Math.cos(ma)*r*.62,cy+Math.sin(ma)*r*.62);
    }
    angle+=slice;
  });
  ctx.textBaseline='alphabetic';
  const lgX=W-150;
  (set.labH||set.labels).forEach((lb,i)=>{
    const ly=22+i*27;
    ctx.fillStyle=colors[i%colors.length];ctx.beginPath();ctx.arc(lgX+7,ly,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';ctx.font='11px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(set.labels[i]+' '+set.values[i]+'%',lgX+18,ly);
  });
  ctx.textBaseline='alphabetic';
}

function dCombo(ctx,set){
  const ticks=5;
  const smB=nMax(Math.max(...set.barValues)*1.1,ticks);
  const smL=nMax(Math.max(...set.lineValues)*1.15,ticks);
  const n=set.labels.length,gap=CW/n,bw=gap*.48;
  // 棒グリッド（左軸青）
  ctx.strokeStyle='#e8e8e8';ctx.lineWidth=1;
  for(let i=0;i<=ticks;i++){
    const v=smB/ticks*i,y=PT+CH-(v/smB)*CH;
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(PL+CW,y);ctx.stroke();
    ctx.fillStyle='#1565c0';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText(v,PL-4,y+4);
  }
  // 右軸（折れ線・赤）
  for(let i=0;i<=ticks;i++){
    const v=Math.round(smL/ticks*i),y=PT+CH-(v/smL)*CH;
    ctx.fillStyle='#c62828';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.fillText(v+'℃',PL+CW+2,y+4);
  }
  // 棒
  set.barValues.forEach((v,i)=>{
    const x=PL+i*gap+(gap-bw)/2,bh=(v/smB)*CH;
    ctx.fillStyle='rgba(41,182,246,0.65)';rRect(ctx,x,PT+CH-bh,bw,bh,3);
  });
  // 折れ線
  ctx.strokeStyle='#e53935';ctx.lineWidth=2.5;ctx.beginPath();
  set.lineValues.forEach((v,i)=>{const x=PL+i*gap+gap/2,y=PT+CH-(v/smL)*CH;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.stroke();
  set.lineValues.forEach((v,i)=>{
    const x=PL+i*gap+gap/2,y=PT+CH-(v/smL)*CH;
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#c62828';ctx.fill();
  });
  set.labels.forEach((lb,i)=>{
    ctx.fillStyle='#555';ctx.font='8px sans-serif';ctx.textAlign='center';
    ctx.fillText(lb,PL+i*gap+gap/2,PT+CH+16);
  });
  // 凡例
  ctx.fillStyle='rgba(41,182,246,.7)';ctx.fillRect(PL,H-14,11,11);
  ctx.fillStyle='#333';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.fillText('降水量(mm)',PL+14,H-4);
  ctx.strokeStyle='#e53935';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(PL+90,H-9);ctx.lineTo(PL+102,H-9);ctx.stroke();
  ctx.fillStyle='#c62828';ctx.fillText('気温(℃)',PL+105,H-4);
}

// =====================================================================
// エフェクト
// =====================================================================
function fireStars(n=8){
  const c=document.getElementById('starsC');c.style.display='block';
  const em=['⭐','🌟','✨','💫','🎉','🎊'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const s=document.createElement('span');s.className='star';
      s.textContent=em[0|Math.random()*em.length];
      s.style.left=Math.random()*88+'%';s.style.top=(Math.random()*45+35)+'%';
      s.style.animationDelay=Math.random()*.3+'s';
      c.appendChild(s);setTimeout(()=>s.remove(),1500);
    },i*60);
  }
  setTimeout(()=>c.style.display='none',2400);
}

// =====================================================================
// 起動
// =====================================================================
renderTabs();
startSession();
</script>
